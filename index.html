<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curio Collection by Hilton | Fishers, Indiana</title>
<style>
:root {
  --bg-primary: #0C1821;
  --bg-secondary: #132030;
  --bg-card: #17293A;
  --bg-card-hover: #1C3148;
  --text-primary: #F0EDE8;
  --text-secondary: #A0B0BE;
  --text-muted: #7A8D9E;
  --accent: #C8A96E;
  --accent-light: #D9C08A;
  --accent-dark: #A88C52;
  --green: #5AAF7B;
  --border: #243546;
  --border-light: #2E4558;
  --nav-bg: rgba(12, 24, 33, 0.92);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg-primary); color: var(--text-primary);
  line-height: 1.6; overflow-x: hidden; -webkit-font-smoothing: antialiased;
}
h1, h2, h3, h4, h5 { font-family: Georgia, 'Times New Roman', serif; font-weight: 400; line-height: 1.2; }

/* === NAV === */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  background: transparent; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid transparent;
  transition: background 0.4s ease, border-color 0.4s ease;
}
nav.scrolled { background: var(--nav-bg); border-bottom-color: rgba(200, 169, 110, 0.1); }
nav .nav-inner {
  max-width: 1200px; margin: 0 auto; padding: 0 40px;
  display: flex; align-items: center; justify-content: space-between; height: 60px;
}
nav .nav-brand { font-family: Georgia, serif; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); }
nav .nav-links { display: flex; gap: 28px; list-style: none; }
nav .nav-links a {
  color: var(--text-secondary); text-decoration: none; font-size: 12px;
  letter-spacing: 1.5px; text-transform: uppercase; transition: color 0.3s; position: relative;
}
